services:
  - type: web
    name: ruragriconnect-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /opt/render/project/src/data/ruragriconnect.db
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
    disk:
      name: db-storage
      mountPath: /opt/render/project/src/data
      sizeGB: 1
