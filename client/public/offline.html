<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuralAgriConnect — Offline</title>
  <style>
    body { font-family: sans-serif; background: #1B4332; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; }
    .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; max-width: 360px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { opacity: 0.8; line-height: 1.6; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .btn { margin-top: 24px; display: inline-block; background: #52B788; color: #fff; padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌿</div>
    <h1>You're Offline</h1>
    <p>RuralAgriConnect is running in offline mode. Your cached advisories, weather data, and AI responses are still available.</p>
    <a href="/" class="btn">Go to App →</a>
  </div>
</body>
</html>
