name: ruragriconnect_mobile
description: RurAgriConnect - Offline-first agricultural advisory mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client — talks to Railway API
  dio: ^5.4.3+1

  # SQLite — offline-first local data
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # SECURITY FIX — A04: Secure token storage (JWT) using platform Keychain/Keystore
  # Android: EncryptedSharedPreferences (AES-256 via Android Keystore)
  # iOS: Keychain with first_unlock accessibility
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # Connectivity
  connectivity_plus: ^5.0.2

  # Form validation
  email_validator: ^2.1.17

  # Loading indicators
  flutter_spinkit: 5.1.0

  # UUID for SQLite primary keys
  uuid: ^4.3.3

  # Session persistence (non-sensitive data only — sensitive data uses flutter_secure_storage)
  shared_preferences: ^2.2.3

  # Camera & gallery for AI diagnosis
  image_picker: ^1.1.2

  # App documents directory (for storing scan images)
  path_provider: ^2.1.3

  # SECURITY FIX — A04: Crypto for HMAC/SHA-256 operations
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
